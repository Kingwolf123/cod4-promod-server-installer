



// promod live v2 - sample server config v1.4
// for public ruleset customizations, see z_c_r.iwd

// info strings
sets _Admin "NamelessAdmin"
sets _Email "AdminEmail"
sets _Website ""
sets _Location "Pakistan"
sets _Irc ""
sets sv_hostname "Community Match Server "
set com_hunkMegs "512" 
set net_noipx "2"  
set sv_steamforce "0" // 0 = Players can join with or without Steam ; 1 = Players must have steam enabled. Helps counter guid changer

// welcome message, message of the day (motd)
seta scr_motd "Welcome. "

// password settings
//set rcon_password "" // read server_setup.txt why we don't specify rcon password here
set sv_privatePassword "" // private slots password
set g_password "1234" // server password

set logfile "1"
set g_logsync "1"


// loadplugin antispam
loadplugin simplebanlist

seta g_friendlyPlayerCanBlock "1"

seta sv_contellname "^5PK^2Promod^7->^5PM: ^7"
seta sv_consayname "^5PK^2Promod: ^7"

// player slots, maxclients - privateclients = public slots
set sv_maxclients "24" // maximum number of clients
set sv_privateclients "" // number of private slots

// client download settings
set sv_allowdownload "1"
seta sv_wwwDownload "1" // enable download redirection
//seta sv_wwwBaseURL "http://your_ipv4:8000/cod4/" // defines url to download from
seta sv_wwwBaseURL "http://[ipv6]:8000/cod4/" // defines url to download from


seta sv_wwwDlDisconnected "0" // disconnect clients while downloading

// map rotation
set sv_maprotationcurrent "" // leave empty
//set sv_mapRotation "gametype sd map mp_crash gametype sd map mp_crossfire gametype sd map mp_strike gametype sd map mp_backlot_x gametype sd map mp_citystreets"

// promod settings
set promod_mode "match_mr12_ot3" // promod mode, for a list of promod modes see attached readme
set promod_enable_scorebot "1" // match-modes only

